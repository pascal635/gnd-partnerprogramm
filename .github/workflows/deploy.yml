name: Deploy (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, bcmath, mbstring, pdo_mysql, zip, gd, curl, dom, fileinfo
          coverage: none

      - name: Composer install (ohne dev)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress

      # Nur damit artisan im Build läuft – diese .env wird NICHT hochgeladen.
      - name: .env für den Build
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend-Assets bauen
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Filament-Assets veröffentlichen
        run: php artisan filament:assets

      - name: lftp installieren
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      # FTPS-Upload via lftp: hält Verschlüsselung UND wiederholt abgebrochene
      # Übertragungen automatisch (robust bei vielen Dateien / instabilem FTP).
      # .env und Runtime-Daten werden NICHT übertragen.
      - name: FTPS-Upload (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" "$FTP_SERVER" -e "set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no; set net:max-retries 5; set net:timeout 30; set net:reconnect-interval-base 5; set mirror:parallel-transfer-count 3; mirror -R --ignore-time --parallel=3 --exclude node_modules/ --exclude tests/ --exclude docs/ --exclude [.]github/ --exclude [.]git --exclude [.]env\$ --exclude storage/logs/ --exclude storage/framework/cache/ --exclude storage/framework/sessions/ --exclude storage/framework/views/ ./ . ; bye"

      # Ohne SSH: Migrationen + Cache über die geschützte Deploy-Route auslösen.
      - name: Migrationen & Cache auf dem Server auslösen
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -n "$DEPLOY_URL" ] && [ -n "$DEPLOY_TOKEN" ]; then
            echo "Rufe Deploy-Hook auf …"
            curl -fsS "$DEPLOY_URL/gnd-deploy/$DEPLOY_TOKEN" && echo "" || echo "Deploy-Hook fehlgeschlagen – bitte URL einmal manuell im Browser aufrufen."
          else
            echo "DEPLOY_URL/DEPLOY_TOKEN nicht gesetzt – Migrationen bitte manuell über die Deploy-URL auslösen."
          fi
